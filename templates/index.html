<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WithUs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#EFF6FF;
  --color-border-tertiary:#DBEAFE;
  --color-text-primary:#1e293b;
  --color-text-secondary:#64748b;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#EFF6FF;
  font-family:var(--font-sans);
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,0.15) 0%,transparent 70%);
  top:-130px;left:-150px;pointer-events:none;z-index:0;
  animation:orb1 9s ease-in-out infinite alternate;
}
body::after{
  content:'';position:fixed;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(29,158,117,0.12) 0%,transparent 70%);
  bottom:-80px;right:-80px;pointer-events:none;z-index:0;
  animation:orb2 11s ease-in-out infinite alternate;
}
.orb3{
  position:fixed;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,0.09) 0%,transparent 70%);
  bottom:30%;left:-80px;pointer-events:none;z-index:0;
  animation:orb1 13s ease-in-out infinite alternate-reverse;
}
@keyframes orb1{from{transform:translate(0,0) scale(1)}to{transform:translate(35px,25px) scale(1.07)}}
@keyframes orb2{from{transform:translate(0,0) scale(1)}to{transform:translate(-25px,-18px) scale(1.05)}}
textarea,input,button{font-family:var(--font-sans)}
textarea:focus,input:focus{outline:none}
.sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
.fade-in{animation:fi .3s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.post-new{animation:postIn .45s cubic-bezier(.22,.68,0,1.2) both}
@keyframes postIn{
  from{opacity:0;transform:translateY(-18px) scale(0.97)}
  to  {opacity:1;transform:translateY(0)     scale(1)}
}
.post-card{
  background:#fff;
  border:1.5px solid #DBEAFE;
  border-radius:16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(37,99,235,0.07),0 0 0 0 rgba(37,99,235,0);
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  cursor:default;
}
.post-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(37,99,235,0.14);
  border-color:#93C5FD;
}
.btn-blue{
  background:#2563EB;color:#fff;border:none;cursor:pointer;
  border-radius:10px;font-weight:600;font-family:inherit;
  transition:background .15s ease,transform .12s ease,box-shadow .15s ease;
}
.btn-blue:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.3)}
.btn-blue:active{transform:translateY(0);box-shadow:none}
.btn-ghost{
  border:none;background:transparent;cursor:pointer;
  border-radius:8px;padding:4px 8px;
  transition:background .15s ease,color .15s ease,transform .12s ease;
}
.btn-ghost:hover{background:rgba(37,99,235,0.08);transform:scale(1.08)}
.btn-ghost:active{transform:scale(0.96)}
.tag-pill{
  display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;
  cursor:pointer;border:0.5px solid rgba(37,99,235,0.15);
  transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease;
}
.tag-pill:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(37,99,235,0.15);opacity:.9}
.tag-pill:active{transform:scale(0.96)}
.quiz-opt{
  width:100%;padding:11px 14px;border-radius:10px;font-size:13px;cursor:pointer;
  text-align:left;font-family:inherit;
  transition:background .15s ease,border-color .15s ease,transform .12s ease;
}
.quiz-opt:hover{transform:translateX(3px)}
.nav-btn{
  flex:1;padding:10px 2px 8px;border:none;background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;
  transition:color .15s ease,opacity .15s ease;
}
.nav-btn:hover{opacity:.85}
</style>
</head>
<body>

<div class="orb3" aria-hidden="true"></div>
<h2 class="sr-only">WithUs — social wellness platform with AI mood tracing</h2>
<div id="root" style="max-width:420px;margin:0 auto;padding:0 0 2rem;position:relative;z-index:1"></div>

<script>
// ── Data injected by Flask ─────────────────────────────────────────────────
const DISPLAY_NAME    = {{ display_name   | tojson }};
const USER_INITIALS   = DISPLAY_NAME.substring(0,2).toUpperCase();
const FEED_POSTS      = {{ feed_posts     | tojson }};
const WEEK_DATA       = {{ week_data      | tojson }};
const INITIAL_REPORT  = {{ initial_report | tojson }};
const QUIZ_LIST       = {{ quiz_questions | tojson }};
const MODEL_READY     = {{ model_ready    | tojson }};
const MODEL_INFO      = {{ model_info     | tojson }};
const FEEDBACK_STATS  = {{ feedback_stats | tojson }};

// ── Design system ─────────────────────────────────────────────────────────
const PALETTE={
  teal:"#1D9E75",tealBg:"#E1F5EE",tealText:"#085041",
  amber:"#BA7517",amberBg:"#FAEEDA",amberText:"#633806",
  red:"#A32D2D",redBg:"#FCEBEB",redText:"#501313",
  purple:"#2563EB",purpleBg:"#DBEAFE",purpleText:"#1e3a8a",
  gray:"#888780",grayBg:"#F1EFE8",grayText:"#2C2C2A",
};

const TAGS=["#sober-today","#craving","#relapsed","#recovery","#triggered","#peer-pressure","#used-last-night","#clean-week","#withdrawing","#resisted","#ashamed","#seeking-help","#isolated","#proud","#supported","#strong"];
const NEG_TAGS=["#craving","#relapsed","#triggered","#peer-pressure","#used-last-night","#withdrawing","#ashamed","#isolated"];
const POS_TAGS=["#sober-today","#recovery","#clean-week","#resisted","#seeking-help","#proud","#supported","#strong"];


const ECFG={
  joy:{color:"#1D9E75",bg:"#E1F5EE",label:"Joy"},
  sadness:{color:"#378ADD",bg:"#E6F1FB",label:"Sadness"},
  fear:{color:"#2563EB",bg:"#DBEAFE",label:"Anxiety"},
  anger:{color:"#D85A30",bg:"#FAECE7",label:"Anger"},
  disgust:{color:"#A855F7",bg:"#F5F3FF",label:"Disgust"},
  surprise:{color:"#06B6D4",bg:"#ECFEFF",label:"Surprise"},
  neutral:{color:"#888780",bg:"#F1EFE8",label:"Neutral"},
};

// 8 questions from scoring.py displayed step-by-step
const CHECKIN_QUESTIONS = QUIZ_LIST.map((q,i)=>({q,key:`q${i}`}));
const QLABELS=["Never","Rarely","Sometimes","Often / Daily"];

const RESOURCES={
  helplines:[
    {name:"Befrienders Mauritius",tel:"800 93 93",url:"http://befriendersmauritius.com",desc:"Free, anonymous emotional support — available 24/7"},
    {name:"ADSU — Anti Drug & Smuggling Unit",tel:"208 1212",url:"https://police.govmu.org/police/?page_id=4919",desc:"Confidential drug-related support & reporting"},
    {name:"Find a Helpline — Mauritius",tel:"",url:"https://findahelpline.com/countries/mu/topics/substance-use",desc:"Directory of substance-use helplines in Mauritius"},
  ],
  centres:[
    {
      name:"Centre de Solidarité (CDS)",
      tel:"+230 464 9980",
      tel2:"+230 464 7815",
      url:"https://centredesolidarite.org",
      addr:"Impasse Larcher, Route Royale, Rose Hill",
      desc:"Holistic community-based care — counselling, residential rehab, family support",
    },
    {
      name:"Les Mariannes Wellness Sanctuary",
      tel:"+230 5257 7070",
      tel2:"+230 5728 7110",
      url:"https://lesmariannes.com",
      addr:"Royal Road, Congomah",
      desc:"Medically supervised detox & addiction rehabilitation, 24/7 clinical care",
    },
    {
      name:"Dr Idriss Goomany Centre",
      tel:"+230 242 3016",
      tel2:"+230 404 2113",
      url:"https://www.actogether.mu/find-an-ngo/dr-idriss-goomany-centre-for-the-prevention-and-treatment-of-alcoholism-and-drug-addiction",
      addr:"Sir Edgar Laurent Street, Port-Louis",
      desc:"Free outpatient treatment, prevention programmes & reintegration support",
    },
    {
      name:"Frangipane Detoxification & Rehabilitation Centre",
      tel:"",
      tel2:"",
      url:"https://www.govmu.org/EN/newsgov/SitePages/Frangipane-Detoxification-and-Rehabilitation-Centre-extended-to-provide-additional-services-to-drug-victims.aspx",
      addr:"Mauritius (Government facility)",
      desc:"Government-run detox & rehabilitation centre for drug victims",
    },
  ],
};

const TIPS={
  low:[
    "Map your triggers — write down the places, people, or feelings that make you want to use. Awareness is the first defence.",
    "Build a refusal plan for situations where substances might be offered. Practice saying no out loud before you need to.",
    "Stay connected with at least one person who supports your recovery journey this week.",
  ],
  medium:[
    "Use the 5-minute rule: when a craving hits, wait 5 minutes and distract yourself — cravings peak and pass.",
    "Consider calling Befrienders Mauritius (800 93 93) — free, confidential, available 24/7. Talking helps.",
    "Tell someone you trust what you're going through. Carrying it alone makes it harder.",
  ],
  high:[
    "Please call Befrienders Mauritius now: 800 93 93 — anonymous, free, 24/7. You don't have to face this alone.",
    "ADSU (208 1212) and Barakatt Youth Foundation (213 3113) offer confidential support and recovery pathways.",
    "A trained care reviewer has been notified via your anonymous code only. No punitive action is ever taken.",
  ],
};

// ── State ─────────────────────────────────────────────────────────────────
let state={
  tab:"feed",
  posts:[...FEED_POSTS],
  newPostsAvailable:0,
  newText:"",
  newTags:[],
  analyzing:false,
  likedPosts:{},
  checkInAnswers:{},
  checkInDone: INITIAL_REPORT!==null,
  checkInScore: INITIAL_REPORT ? INITIAL_REPORT.quizScore : 0,
  riskTier: INITIAL_REPORT ? INITIAL_REPORT.riskTier : "low",
  reportData: INITIAL_REPORT,
  reportReady: INITIAL_REPORT!==null,
  showResourceModal:false,
  quizStep:0,
  feedbackGiven:{},
  communityAccuracy: FEEDBACK_STATS.accuracy,
  feedbackTotal:     FEEDBACK_STATS.total,
  feedbackCorrect:   FEEDBACK_STATS.correct,
  weekData:          Object.assign({}, WEEK_DATA),
  commentModal:{open:false,postId:null,postText:"",comments:[],loading:false,submitting:false,draft:""},
  guidelinesDismissed:false,
  reportHistory:[],
  reportHistoryLoaded:false,
  _newPostId:null,
};

// ── Helpers ───────────────────────────────────────────────────────────────
function tierColor(t){
  if(t==="high")   return {c:PALETTE.red,  bg:PALETTE.redBg,  ct:PALETTE.redText,  label:"Elevated — support recommended"};
  if(t==="medium") return {c:PALETTE.amber,bg:PALETTE.amberBg,ct:PALETTE.amberText,label:"Moderate — stay mindful"};
  return                   {c:PALETTE.teal, bg:PALETTE.tealBg, ct:PALETTE.tealText, label:"Low — things look steady"};
}

function miniChart(){
  const days=state.weekData.moods;
  const W=340,H=70,pad=20;
  const emoH={joy:10,neutral:35,surprise:30,fear:50,sadness:60,anger:65,disgust:55};
  const pts=days.map((d,i)=>({
    x:pad+i*(W-2*pad)/6,
    y:emoH[d.emotion]||35,
    c:(ECFG[d.emotion]||ECFG.neutral).color,
    label:d.day,
  }));
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  return `<svg width="${W}" height="${H+20}" viewBox="0 0 ${W} ${H+20}" style="width:100%;display:block">
    <polyline points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-dasharray="3 2"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="${p.c}"/>`).join("")}
    ${pts.map(p=>`<text x="${p.x}" y="${H+16}" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">${p.label}</text>`).join("")}
  </svg>`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const S=state;
  const tier=tierColor(S.riskTier);

  const NAV_ITEMS=[
    {key:"feed",    icon:"ti-layout-grid",    label:"Feed"},
    {key:"my",      icon:"ti-user",           label:"Mine"},
    {key:"report",  icon:"ti-chart-bar",      label:"Report"},
    {key:"checkin", icon:"ti-clipboard-check",label:"Screen"},
    {key:"ai",      icon:"ti-brain",          label:"AI"},
    {key:"settings",icon:"ti-settings",       label:"Settings"},
  ];

  const guidelinesBanner=(!S.guidelinesDismissed)?`
    <div style="margin:12px 14px 0;background:linear-gradient(135deg,rgba(37,99,235,0.12) 0%,rgba(29,158,117,0.08) 100%);border:1px solid rgba(37,99,235,0.22);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(37,99,235,0.08)">
      <div style="padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#2563EB,#1D9E75);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="ti ti-heart-handshake" style="font-size:15px;color:#fff" aria-hidden="true"></i>
          </div>
          <span style="font-size:13px;font-weight:700;color:#1e3a8a;letter-spacing:.01em">Community Guidelines</span>
        </div>
        <button onclick="ST('guidelinesDismissed',true)" aria-label="Dismiss" style="border:none;background:rgba(37,99,235,0.1);cursor:pointer;color:#2563EB;padding:4px 8px;border-radius:8px;font-size:13px;font-weight:600;line-height:1;flex-shrink:0">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid rgba(37,99,235,0.12)">
        ${[
          ["ti-hand-stop",   "No bullying"],
          ["ti-mood-smile",  "Be kind always"],
          ["ti-shield-check","Safe space"],
          ["ti-ban",         "No judging"],
          ["ti-heart",       "Support others"],
          ["ti-users",       "We recover together"],
        ].map(([icon,label],i)=>`
          <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;${i%2===0?'border-right:1px solid rgba(37,99,235,0.1)':''};${i<4?'border-bottom:1px solid rgba(37,99,235,0.1)':''}">
            <i class="ti ${icon}" style="font-size:14px;color:#2563EB;flex-shrink:0" aria-hidden="true"></i>
            <span style="font-size:12px;color:#1e3a8a;font-weight:500">${label}</span>
          </div>`).join("")}
      </div>
      <div style="padding:8px 14px;background:rgba(37,99,235,0.06);border-top:1px solid rgba(37,99,235,0.1)">
        <p style="font-size:11px;color:#3b82f6;text-align:center;font-style:italic">This is a private, judgment-free space for recovery. You are not alone. 💙</p>
      </div>
    </div>`:"";

  const nav=`<div style="display:flex;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10">
    ${NAV_ITEMS.map(n=>`<button onclick="switchTab('${n.key}')" class="nav-btn" style="border-bottom:${S.tab===n.key?'2px solid #2563EB':'2px solid transparent'};color:${S.tab===n.key?'#2563EB':'var(--color-text-secondary)'};font-weight:${S.tab===n.key?600:400}">
      <i class="ti ${n.icon}" style="font-size:19px" aria-hidden="true"></i>${n.label}
    </button>`).join("")}
  </div>`;

  let content="";

  // ── Feed tab ─────────────────────────────────────────────────────────
  if(S.tab==="feed"){
    const postCards=S.posts.map(p=>{
      const ec=ECFG[p.emotion]||ECFG.neutral;
      const liked=S.likedPosts[p.id];
      const isNew=S._newPostId===p.id;
      return `<div class="post-card${isNew?' post-new':''}" style="">
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 8px">
          <div style="width:38px;height:38px;border-radius:50%;background:${ec.bg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:${ec.color};flex-shrink:0">${p.avatar}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${p.name}</p>
            <p style="font-size:11px;color:var(--color-text-secondary)">${p.time==="now"?"just now":p.time+" ago"} · <span style="color:${ec.color}">${ec.label}</span></p>
          </div>
          <span style="font-size:10px;background:${ec.bg};color:${ec.color};border-radius:20px;padding:2px 8px;border:1px solid ${ec.color}22">${Math.round(p.score*100)}%</span>
        </div>
        <p style="padding:0 14px 10px;font-size:14px;color:var(--color-text-primary);line-height:1.5">${p.text}</p>
        <div style="padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px">
          ${(p.tags||[]).map(t=>`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${NEG_TAGS.includes(t)?'#FAEEDA':'#E1F5EE'};color:${NEG_TAGS.includes(t)?'#633806':'#085041'}">${t}</span>`).join("")}
        </div>
        <div style="display:flex;border-top:0.5px solid var(--color-border-tertiary);padding:6px 10px;gap:4px;align-items:center">
          <button onclick="toggleLike(${p.id})" class="btn-ghost" style="font-size:12px;color:${liked?'#D85A30':'var(--color-text-secondary)'};display:flex;align-items:center;gap:4px">
            <i class="ti ti-heart${liked?' ti-filled':''}" style="font-size:16px" aria-hidden="true"></i>${(p.likes+(liked?1:0))}
          </button>
          <button onclick="openComments(${p.id})" class="btn-ghost" style="font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px" id="cmtbtn-${p.id}">
            <i class="ti ti-message-circle" style="font-size:16px" aria-hidden="true"></i><span id="cmtcount-${p.id}">${p.comments}</span>
          </button>
          <div style="margin-left:auto;display:flex;align-items:center;gap:2px">
            ${S.feedbackGiven[p.id]
              ?`<span style="font-size:10px;color:var(--color-text-secondary);padding:2px 6px">AI: ${ec.label} · ${S.feedbackGiven[p.id]==="up"?"👍":"👎"}</span>`
              :`<span style="font-size:10px;color:var(--color-text-secondary);padding:0 4px">AI: ${ec.label}</span>
                <button onclick="giveFeedback(${p.id},'${p.emotion}',true)" class="btn-ghost" title="Correct" style="font-size:15px" aria-label="Correct">👍</button>
                <button onclick="giveFeedback(${p.id},'${p.emotion}',false)" class="btn-ghost" title="Wrong" style="font-size:15px" aria-label="Wrong">👎</button>`}
          </div>
        </div>
      </div>`;
    }).join("");

    const btnOk=S.newText.trim()&&!S.analyzing;
    content=`
      ${S.newPostsAvailable>0?`<button onclick="loadNewPosts()" style="width:100%;padding:9px;border-radius:10px;font-size:13px;font-weight:500;background:#2563EB;color:#fff;border:none;cursor:pointer;margin-bottom:10px">
        <i class="ti ti-refresh" style="font-size:14px;vertical-align:-2px;margin-right:5px" aria-hidden="true"></i>
        ${S.newPostsAvailable} new post${S.newPostsAvailable>1?'s':''} — tap to load
      </button>`:''}
      <div style="background:#fff;border:1.5px solid #DBEAFE;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(37,99,235,0.08)">
        <div style="font-size:11px;color:#64748b;margin-bottom:8px">Be kind · No judging · No bullying · Support each other</div>
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#2563EB;flex-shrink:0">${USER_INITIALS}</div>
          <div style="flex:1">
            <textarea id="newpost" rows="2" placeholder="How are you doing with your recovery today?" style="width:100%;resize:none;font-size:13px;line-height:1.5;border:none;background:transparent;color:var(--color-text-primary)"></textarea>
            ${(()=>{const e=liveEmotion(S.newText);return e&&ECFG[e]?`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${ECFG[e].bg};color:${ECFG[e].color}">${ECFG[e].label}</span>`:"";})()}
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
          ${TAGS.slice(0,8).map(t=>`<button onclick="toggleTag('${t}')" class="tag-pill" style="background:${S.newTags.includes(t)?(NEG_TAGS.includes(t)?'#BA7517':'#1D9E75'):'#F1F5F9'};color:${S.newTags.includes(t)?'#fff':'var(--color-text-secondary)'}">${t}</button>`).join("")}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid var(--color-border-tertiary);padding-top:10px">
          <span style="font-size:11px;color:var(--color-text-secondary)"><i class="ti ti-lock" style="font-size:13px;vertical-align:-2px" aria-hidden="true"></i> ${MODEL_READY?'AI-traced, private':'AI loading…'}</span>
          <button onclick="doPost()" class="${btnOk?'btn-blue':''}" style="padding:7px 18px;font-size:13px;font-weight:600;cursor:default;background:${btnOk?'':'#E2E8F0'};color:${btnOk?'':'#94A3B8'};border:none;border-radius:10px;opacity:${btnOk?1:0.6}">
            ${S.analyzing?'<i class="ti ti-loader-2" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Tracing…':'Post'}
          </button>
        </div>
      </div>
      ${postCards}
    `;
  }

  // ── My posts tab ──────────────────────────────────────────────────────
  else if(S.tab==="my"){
    const myPosts=S.posts.filter(p=>p.isOwn);
    content=`

    cta.value=state.commentModal.draft;
    cta.addEventListener("input",e=>{
      state.commentModal.draft=e.target.value;
      e.target.style.height="auto";
      e.target.style.height=e.target.scrollHeight+"px";
    });
    cta.dispatchEvent(new Event("input"));
    cta.focus();
  }
}

// ── Event handlers ────────────────────────────────────────────────────────
function ST(key,val){state[key]=val;render();}

async function switchTab(key){
  if(state.tab===key) return;
  state.tab=key;
  render();
  window.scrollTo({top:0,behavior:"smooth"});

  // Feed & Mine — refresh posts immediately
  if(key==="feed"||key==="my"){
    try{
      const r=await fetch("/api/feed");
      if(!r.ok) return;
      const fresh=await r.json();
      const newOnes=fresh.filter(p=>!_knownIds.has(p.id));
      if(newOnes.length>0){
        newOnes.forEach(p=>{ _knownIds.add(p.id); state.posts.unshift(p); });
      }
      state.posts.forEach((p,i)=>{
        const match=fresh.find(f=>f.id===p.id);
        if(match){ state.posts[i].time=match.time; state.posts[i].comments=match.comments; }
      });
      render();
    }catch(e){}
  }

  // AI — refresh feedback stats + week data (charts reload via Date.now())
  if(key==="ai"){
    try{
      const [sr,wr]=await Promise.all([fetch("/api/stats"),fetch("/api/week-data")]);
      if(sr.ok){ const d=await sr.json(); const fs=d.feedbackStats||{}; state.communityAccuracy=fs.accuracy; state.feedbackTotal=fs.total||0; state.feedbackCorrect=fs.correct||0; }
      if(wr.ok){ state.weekData=await wr.json(); }
      render();
    }catch(e){}
  }

  // Settings — load past reports
  if(key==="settings" && !state.reportHistoryLoaded){
    try{
      const r=await fetch("/api/reports");
      if(r.ok){ const d=await r.json(); state.reportHistory=d.reports||[]; state.reportHistoryLoaded=true; render(); }
    }catch(e){}
  }

  // Report & Mine — refresh week data (charts + stats update)
  if(key==="report"||key==="my"){
    try{
      const r=await fetch("/api/week-data");
      if(!r.ok) return;
      state.weekData=await r.json();
      render();
    }catch(e){}
  }

  // Screen — static quiz, nothing to fetch
}

// ── Comments ──────────────────────────────────────────────────────────────
async function openComments(postId){
  state.commentModal={open:true,postId,comments:[],loading:true,submitting:false,draft:""};
  render();
  try{
    const r=await fetch(`/api/comments/${postId}`);
    const data=await r.json();
    state.commentModal.comments=data.comments||[];
    state.commentModal.loading=false;
  }catch(e){
    state.commentModal.loading=false;
  }
  render();
}

async function runTraining(){
  const btn=document.getElementById("trainBtn");
  const res=document.getElementById("trainResult");
  if(!btn||!res) return;
  btn.disabled=true;
  btn.textContent="Training…";
  res.style.display="none";
  try{
    const r=await fetch("/api/train",{method:"POST",headers:{"Content-Type":"application/json"}});
    const data=await r.json();
    if(data.ok){
      res.innerHTML=`<div style="background:#E1F5EE;border-radius:6px;padding:8px 10px;line-height:1.5">
        <strong style="color:#085041">Calibration complete</strong><br>
        <span style="color:#1D9E75">${data.message}</span>
        ${data.calibrated_emotions>0?`<br><span style="color:#085041">Emotions recalibrated: <strong>${data.calibrated_emotions}</strong></span>`:''}
      </div>`;
      if(data.accuracy!==null){ state.communityAccuracy=data.accuracy; render(); }
    }
  }catch(e){
    res.innerHTML=`<span style="color:#A32D2D">Training failed — try again.</span>`;
  }
  res.style.display="block";
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-cpu" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Run RL calibration step';
}

function closeComments(){
  state.commentModal={open:false,postId:null,comments:[],loading:false,submitting:false,draft:""};
  render();
}

async function submitComment(){
  const cm=state.commentModal;
  if(!cm.draft.trim()||cm.submitting) return;
  state.commentModal.submitting=true;
  render();
  try{
    const r=await fetch("/api/comment",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({postId:cm.postId,text:cm.draft.trim()}),
    });
    const data=await r.json();
    if(data.comment){
      const c=data.comment;
      state.commentModal.comments.push({
        id:c.id,avatar:c.avatar,name:c.name,text:c.text,time:"now"
      });
      state.commentModal.draft="";
      // Update count on the post card
      const p=state.posts.find(p=>p.id===cm.postId);
      if(p){ p.comments=(p.comments||0)+1; }
    }
  }catch(e){}
  state.commentModal.submitting=false;
  render();
}

function toggleLike(id){
  state.likedPosts[id]=!state.likedPosts[id];
  render();
}

async function giveFeedback(postId, emotion, isCorrect){
  state.feedbackGiven[postId]=isCorrect?"up":"down";
  render();
  try{
    const r=await fetch("/api/feedback",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({postId, predicted:emotion, isCorrect}),
    });
    if(r.ok){
      state.feedbackTotal=(state.feedbackTotal||0)+1;
      if(isCorrect) state.feedbackCorrect=(state.feedbackCorrect||0)+1;
      const total=state.feedbackTotal, correct=state.feedbackCorrect||0;
      state.communityAccuracy=total>0?Math.round(correct/total*100):null;
      render();
    }
  }catch(e){}
}

function toggleTag(t){
  if(state.newTags.includes(t)) state.newTags=state.newTags.filter(x=>x!==t);
  else state.newTags=[...state.newTags,t];
  render();
}

async function doPost(){
  if(!state.newText.trim()||state.analyzing) return;
  state.analyzing=true; render();

  try {
    const resp = await fetch("/api/post",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:state.newText.trim(),tags:[...state.newTags]}),
    });
    if(resp.ok){
      const data=await resp.json();
      state._newPostId=data.post.id;
      state.posts.unshift(data.post);
      if(data.weekData) state.weekData=data.weekData;
    }
  } catch(e){
    // Fallback: simple client-side emotion guess
    const lower=state.newText.toLowerCase();
    const negW=["drunk","high","wasted","craving","relapsed","withdrawal","withdrawing","dealer","pills","smoked","used","binge","ashamed","triggered","can't stop","gave in","slipped","depressed","hopeless","alone","scared","anxious","dread","hurt"];
    const posW=["sober","clean","recovery","resisted","refused","proud","strong","helped","support","managed","better","grateful","hopeful","free","clear"];
    let emotion="neutral",score=0.65;
    const nH=negW.filter(w=>lower.includes(w)).length;
    const pH=posW.filter(w=>lower.includes(w)).length;
    if(nH>pH){const em=["sadness","fear","anger"];emotion=em[nH%3];score=Math.min(0.92,0.6+nH*0.07);}
    else if(pH>0){emotion="joy";score=Math.min(0.92,0.65+pH*0.07);}
    state.posts.unshift({id:Date.now(),avatar:USER_INITIALS,name:DISPLAY_NAME,time:"now",text:state.newText.trim(),tags:[...state.newTags],likes:0,comments:0,emotion,score,responseTime:30,isOwn:true});
  }

  state.newText=""; state.newTags=[]; state.analyzing=false;
  render();
  if(state._newPostId) setTimeout(()=>{ state._newPostId=null; },500);
}

function setAnswer(key,val){
  state.checkInAnswers[key]=val;
  render();
}

async function nextQ(){
  const step=state.quizStep;
  const total=CHECKIN_QUESTIONS.length;
  if(step<total-1){state.quizStep++;render();return;}

  // Last question — submit to backend
  const answers=CHECKIN_QUESTIONS.map(q=>state.checkInAnswers[q.key]??0);
  const totalScore=answers.reduce((s,v)=>s+v,0);

  try {
    const resp=await fetch("/api/checkin",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({answers}),
    });
    if(resp.ok){
      const report=await resp.json();
      state.riskTier=report.riskTier;
      state.reportData={
        riskTier:report.riskTier,
        message:report.message,
        quizScore:report.quizScore,
        combinedScore:report.combinedScore,
        needsHumanReview:report.needsHumanReview,
        week:report.week,
      };
    }
  } catch(e){
    // Fallback: simple client-side tier
    const negMoods=state.weekData.moods.filter(m=>["sadness","fear","anger"].includes(m.emotion)).length;
    const sig=(totalScore/(total*3))*0.45+(state.weekData.negTagCount/(state.weekData.posTagCount+state.weekData.negTagCount||1))*0.3+(negMoods/7)*0.25;
    state.riskTier=sig>0.58?"high":sig>0.35?"medium":"low";
  }

  state.checkInScore=totalScore;
  state.checkInDone=true;
  render();
}

function prevQ(){if(state.quizStep>0){state.quizStep--;render();}}

// ── Live feed polling ─────────────────────────────────────────────────────
let _knownIds=new Set(state.posts.map(p=>p.id));

async function pollFeed(){
  try{
    const r=await fetch("/api/feed");
    if(!r.ok) return;
    const fresh=await r.json();
    const newOnes=fresh.filter(p=>!_knownIds.has(p.id));
    if(newOnes.length>0){
      state.newPostsAvailable+=newOnes.length;
      // Store them so loadNewPosts() can prepend them
      state._pendingPosts=[...(state._pendingPosts||[]),...newOnes];
      render();
    }
    // Also refresh time labels on existing posts
    state.posts.forEach((p,i)=>{
      const match=fresh.find(f=>f.id===p.id);
      if(match) state.posts[i].time=match.time;
    });
  } catch(e){}
}

function loadNewPosts(){
  const pending=(state._pendingPosts||[]);
  if(pending.length>0) state._newPostId=pending[0].id;
  pending.forEach(p=>{ _knownIds.add(p.id); state.posts.unshift(p); });
  state._pendingPosts=[];
  state.newPostsAvailable=0;
  render();
  if(state._newPostId) setTimeout(()=>{ state._newPostId=null; },500);
}

// Poll every 20 seconds
setInterval(pollFeed, 20000);

// ── Live emotion preview ──────────────────────────────────────────────────
function liveEmotion(text){
  const t=text.toLowerCase();
  const kw={
    joy:    ["sober","clean","resisted","proud","grateful","strong","recovery","better","hopeful","milestone","managed","refused"],
    sadness:["ashamed","relapsed","failed","hopeless","alone","isolated","guilty","worthless","regret","withdrawal","shame"],
    fear:   ["craving","triggered","urge","anxious","panic","scared","dread","struggling","pressure","nervous","tempt"],
    anger:  ["angry","furious","frustrated","rage","unfair","blame","hate"],
    disgust:["disgusted","sick","repulsed"],
  };
  for(const [emo,words] of Object.entries(kw)){
    if(words.some(w=>t.includes(w))) return emo;
  }
  return text.length>10?"neutral":null;
}

// ── Delete account ────────────────────────────────────────────────────────
async function confirmDelete(){
  if(!confirm("This will permanently delete all your posts, screening results, and account.\n\nThis cannot be undone. Continue?")) return;
  const r=await fetch("/api/delete-account",{method:"POST"});
  if(r.ok){
    alert("All your data has been deleted. You will now be logged out.");
    window.location.href="/login";
  } else {
    alert("Something went wrong. Please try again.");
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
render();
