<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WithUs — Log in</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#EFF6FF;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;
  width:520px;height:520px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,0.18) 0%,transparent 70%);
  top:-120px;left:-140px;
  animation:orb1 8s ease-in-out infinite alternate;
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(29,158,117,0.14) 0%,transparent 70%);
  bottom:-80px;right:-80px;
  animation:orb2 10s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes orb1{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}
@keyframes orb2{from{transform:translate(0,0) scale(1)}to{transform:translate(-30px,-20px) scale(1.06)}}
.card{
  position:relative;
  width:100%;max-width:380px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(12px);
  border:1px solid rgba(37,99,235,0.12);
  border-radius:20px;
  padding:36px 28px;
  box-shadow:0 4px 32px rgba(37,99,235,0.1);
}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563EB,#1D9E75);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.logo-title{font-size:22px;font-weight:700;color:#1e3a8a;margin-bottom:4px}
.logo-sub{font-size:12px;color:#64748b}
.error-box{
  background:#FEE2E2;color:#991B1B;
  border-radius:10px;padding:10px 14px;
  font-size:13px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
input[type=text],input[type=password]{
  display:block;width:100%;
  padding:11px 14px;
  border:1.5px solid #DBEAFE;
  border-radius:10px;
  font-size:14px;
  background:#F8FAFF;
  color:#1e293b;
  margin-bottom:12px;
  outline:none;
  font-family:inherit;
  transition:border-color .15s;
}
input:focus{border-color:#2563EB;background:#fff}
button[type=submit]{
  display:block;width:100%;
  padding:12px;
  border-radius:10px;
  font-size:15px;font-weight:600;
  background:#2563EB;color:#fff;
  border:none;cursor:pointer;
  font-family:inherit;
  transition:background .15s;
}
button[type=submit]:hover{background:#1d4ed8}
.hint{text-align:center;font-size:12px;color:#64748b;margin-top:20px;line-height:1.6}
.hint strong{color:#1e3a8a}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <i class="ti ti-heart-handshake" style="font-size:26px;color:#fff" aria-hidden="true"></i>
    </div>
    <div class="logo-title">WithUs</div>
    <div class="logo-sub">Towards Recovery. Together.</div>
  </div>

  {% if error %}
  <div class="error-box">
    <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0" aria-hidden="true"></i>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}">
    <input type="text" name="username" placeholder="Username" autofocus autocomplete="username">
    <input type="password" name="password" placeholder="Password" autocomplete="current-password">
    <button type="submit">Log in / Sign up</button>
  </form>

  <div class="hint">
    New here? Just pick any username and password.<br>
    <strong>Your real identity is never stored.</strong>
  </div>
</div>

</body>
</html>
